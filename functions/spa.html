    <!-- Theme bootstrap — set data-theme BEFORE render so bg matches resolved theme (no flash on F5) -->
    <script>
      (function(){
        try {
          // Priority: explicit user choice > last resolved theme (cached from previous visit) > system pref > light
          var theme = localStorage.getItem('theme')
                    || localStorage.getItem('theme:resolved')
                    || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          document.documentElement.setAttribute('data-theme', theme)
        } catch(e) { document.documentElement.setAttribute('data-theme', 'light') }
      })()
    </script>
    <!-- Critical bg styles — match design tokens so initial paint matches loaded CSS (no flash) -->
    <style>
