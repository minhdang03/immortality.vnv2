name: NODIE
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
options:
  bundleIdPrefix: com.battudao
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # Ngôn ngữ phát triển = vi: key trong Localizable.xcstrings là chuỗi tiếng Việt,
  # máy không khớp locale nào thì rơi về tiếng Việt (CFBundleDevelopmentRegion đọc biến này).
  developmentLanguage: vi
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    # Trình biên dịch tự trích chuỗi vào Localizable.xcstrings mỗi lần build.
    # Tắt nó thì catalog phải cập nhật BẰNG TAY — đã quên hai lần (14 key ở đợt
    # App Store, rồi loạt key trả lời/cảm xúc). Người sẽ quên, trình biên dịch thì không.
    SWIFT_EMIT_LOC_STRINGS: "YES"
targets:
  NODIE:
    type: application
    platform: iOS
    sources:
      - NODIE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.battudao.nodie
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: X6L54S9V87
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: NODIE/NODIE.entitlements
      configs:
        # Debug: automatic signing để chạy simulator/thiết bị lúc dev.
        Debug:
          CODE_SIGN_STYLE: Automatic
          # Build dev nói chuyện với APNs sandbox; token lấy ở đây KHÔNG dùng được với
          # api.push.apple.com và ngược lại — đẩy nhầm môi trường thì APNs trả
          # BadDeviceToken cho một token hoàn toàn hợp lệ.
          APS_ENVIRONMENT: development
        # Release: manual signing với cert phân phối + profile App Store tạo qua ASC API key.
        # Chỉ đặt trên target NODIE (không phải SPM targets — chúng không nhận provisioning profile).
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "NODIE App Store"
          # TestFlight VÀ App Store đều chạy APNs production — TestFlight không phải sandbox.
          APS_ENVIRONMENT: production
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: NODIE/Info.plist
      properties:
        CFBundleDisplayName: NODIE
        # Version sống một chỗ ở settings.base (MARKETING_VERSION/CURRENT_PROJECT_VERSION) —
        # tránh lệch giữa project.yml và Info.plist. Bump release chỉ sửa 1 nơi.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Màu nền be của app (NodieColors.bg #FAF7F0) — launch screen trống sẽ flash
        # trắng một nhịp trước khi UI be hiện ra.
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        # Bảng màu NodieColors là hex cứng tông kem — không có biến thể tối. Không ghim ở đây
        # thì máy để dark mode sẽ ra app kem + alert/menu/sheet/bàn phím đen, lệch tông.
        #
        # PHẢI nằm trong info.properties, KHÔNG phải settings `INFOPLIST_KEY_UIUserInterfaceStyle`:
        # key đó chỉ được đọc khi GENERATE_INFOPLIST_FILE=YES, mà target này khai
        # INFOPLIST_FILE=NODIE/Info.plist → đặt trên settings là config chết, im lặng không chạy.
        UIUserInterfaceStyle: Light
        ITSAppUsesNonExemptEncryption: false
        # Quyền máy ảnh — hỏi lúc bấm "Máy ảnh" trong khay đính kèm, không hỏi lúc mở app.
        # CÙNG BẪY với UIUserInterfaceStyle ở trên: phải nằm trong info.properties, KHÔNG
        # phải settings `INFOPLIST_KEY_NSCameraUsageDescription` — target khai INFOPLIST_FILE
        # nên key đó là config chết. Thiếu chuỗi này thì iOS giết app ngay khi mở máy ảnh,
        # và chỉ lộ khi chạy thật (build vẫn xanh).
        NSCameraUsageDescription: Cho phép NODIE dùng máy ảnh để bạn chụp và gửi ảnh trong trò chuyện.
        # Quyền micro — hỏi lúc bấm nút mic lần đầu. Cùng bẫy INFOPLIST_FILE như hai key trên;
        # thiếu chuỗi này thì iOS giết app ngay khi AVAudioRecorder xin quyền.
        NSMicrophoneUsageDescription: Cho phép NODIE dùng micro để bạn ghi và gửi tin nhắn thoại.
        # Supabase gọi lại app qua scheme này sau khi user bấm link trong mail (đặt lại
        # mật khẩu / xác nhận đăng ký). Custom scheme chứ không Universal Links: khỏi phải
        # dựng apple-app-site-association trên battudao.com — đổi lại iOS chen một nhịp
        # hỏi "Mở trong NODIE?".
        CFBundleURLTypes:
          - CFBundleURLName: com.battudao.nodie
            CFBundleURLSchemes: [nodie]
        # Giá trị đến từ Config/Secrets.xcconfig (gitignored, sinh bằng scripts/generate-secrets-xcconfig.sh).
        # Anon key không phải secret về mặt kỹ thuật (RLS mới bảo vệ dữ liệu, và key này đã
        # public trong bundle web) — nhưng vẫn giữ ngoài git để không tạo tiền lệ xấu.
        # Host thôi, không phải URL đầy đủ — xcconfig coi "//" là comment nên
        # "https://host" sẽ bị cắt cụt thành "https:" (đã dính lỗi này một lần).
        SUPABASE_HOST: $(SUPABASE_HOST)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
  NODIEUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NODIEUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NODIE
schemes:
  NODIE:
    build:
      targets:
        NODIE: all
    test:
      targets:
        - NODIEUITests
      # Credential test auth: xcconfig (gitignored) → scheme → ProcessInfo của test runner.
      # KHÔNG hardcode trong source.
      # Thiếu giá trị → AuthUITests tự skip.
      #
      # PHẢI là tài khoản THƯỜNG (role='user'), KHÔNG BAO GIỜ là admin.
      # 29 policy RLS có nhánh `or is_admin()` → chạy test bằng admin là ngắn mạch toàn bộ
      # phân quyền, tức test không kiểm tra thứ đáng kiểm tra nhất. Trước 17/07 biến này trỏ
      # vào account admin của Đăng và đã giấu BA bug P0 cùng lúc: gửi tin nhắn hỏng hoàn toàn
      # (0031), mở DM bất khả thi (0030), sửa hồ sơ không lưu được (0032) — cả ba đều chạy
      # ngon lành dưới quyền admin. Đổi lại thành admin là mù trở lại.
      environmentVariables:
        NODIE_TEST_EMAIL: $(NODIE_TEST_EMAIL)
        NODIE_TEST_PASSWORD: $(NODIE_TEST_PASSWORD)
        NODIE_TEST_DISPLAY_NAME: $(NODIE_TEST_DISPLAY_NAME)
