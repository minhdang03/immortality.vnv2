name: NODIE
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
options:
  bundleIdPrefix: com.battudao
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # Ngôn ngữ phát triển = vi: key trong Localizable.xcstrings là chuỗi tiếng Việt,
  # máy không khớp locale nào thì rơi về tiếng Việt (CFBundleDevelopmentRegion đọc biến này).
  developmentLanguage: vi
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
targets:
  NODIE:
    type: application
    platform: iOS
    sources:
      - NODIE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.battudao.nodie
        TARGETED_DEVICE_FAMILY: "1"
        # Light-only: bảng màu kem/mực là bản sắc thương hiệu, dark mode sẽ phá tương phản badge.
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
        DEVELOPMENT_TEAM: X6L54S9V87
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # PUSH ĐANG TẮT — bật bằng cách bỏ comment dòng dưới:
        #   CODE_SIGN_ENTITLEMENTS: NODIE/NODIE.entitlements
        #
        # Chưa bật được vì App ID `com.battudao.nodie` CHƯA có capability Push Notifications,
        # nên profile "NODIE App Store" không mang `aps-environment`. Bật entitlement lúc này
        # là Release gãy ngay ở khâu ký (đã thử: "Provisioning profile doesn't include the
        # Push Notifications capability") → mất luôn đường ship TestFlight.
        #
        # Thứ tự phải làm, thiếu bước nào cũng hỏng:
        #   1. developer.apple.com > Identifiers > com.battudao.nodie > tick Push Notifications
        #   2. Tạo lại profile "NODIE App Store" (profile cũ không tự mọc thêm capability)
        #   3. Keys > khoá MỚI có tick "Apple Push Notifications service (APNs)"
        #      — KHÔNG dùng lại AuthKey_AYLK6Z9A58.p8: đó là khoá App Store Connect API
        #      (dùng cho altool), ký JWT bằng nó gọi APNs trả 403 InvalidProviderToken.
        #   4. Điền APNS_KEY_ID + APNS_KEY_PATH vào .env, bỏ comment dòng trên
        #
        # `PushManager` + `NODIE.entitlements` đã viết sẵn và biên dịch được; thiếu entitlement
        # thì `registerForRemoteNotifications` chỉ rơi vào `didFailToRegister` — app vẫn chạy,
        # chỉ là không có push.
      configs:
        # Debug: automatic signing để chạy simulator/thiết bị lúc dev.
        Debug:
          CODE_SIGN_STYLE: Automatic
          # Build dev nói chuyện với APNs sandbox; token lấy ở đây KHÔNG dùng được với
          # api.push.apple.com và ngược lại — đẩy nhầm môi trường thì APNs trả
          # BadDeviceToken cho một token hoàn toàn hợp lệ.
          APS_ENVIRONMENT: development
        # Release: manual signing với cert phân phối + profile App Store tạo qua ASC API key.
        # Chỉ đặt trên target NODIE (không phải SPM targets — chúng không nhận provisioning profile).
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "NODIE App Store"
          # TestFlight VÀ App Store đều chạy APNs production — TestFlight không phải sandbox.
          APS_ENVIRONMENT: production
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: NODIE/Info.plist
      properties:
        CFBundleDisplayName: NODIE
        # Version sống một chỗ ở settings.base (MARKETING_VERSION/CURRENT_PROJECT_VERSION) —
        # tránh lệch giữa project.yml và Info.plist. Bump release chỉ sửa 1 nơi.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Màu nền be của app (NodieColors.bg #FAF7F0) — launch screen trống sẽ flash
        # trắng một nhịp trước khi UI be hiện ra.
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        # Giá trị đến từ Config/Secrets.xcconfig (gitignored, sinh bằng scripts/generate-secrets-xcconfig.sh).
        # Anon key không phải secret về mặt kỹ thuật (RLS mới bảo vệ dữ liệu, và key này đã
        # public trong bundle web) — nhưng vẫn giữ ngoài git để không tạo tiền lệ xấu.
        # Host thôi, không phải URL đầy đủ — xcconfig coi "//" là comment nên
        # "https://host" sẽ bị cắt cụt thành "https:" (đã dính lỗi này một lần).
        SUPABASE_HOST: $(SUPABASE_HOST)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
  NODIEUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - NODIEUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NODIE
schemes:
  NODIE:
    build:
      targets:
        NODIE: all
    test:
      targets:
        - NODIEUITests
      # Credential test auth: xcconfig (gitignored) → scheme → ProcessInfo của test runner.
      # KHÔNG hardcode trong source — account này cũng là admin battudao.com.
      # Thiếu giá trị → AuthUITests tự skip.
      environmentVariables:
        NODIE_TEST_EMAIL: $(NODIE_TEST_EMAIL)
        NODIE_TEST_PASSWORD: $(NODIE_TEST_PASSWORD)
