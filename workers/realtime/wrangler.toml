name = "btd-realtime"
main = "src/worker-entry.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# ── Durable Objects ────────────────────────────────────────────────────────────
[[durable_objects.bindings]]
name = "CHANNEL"
class_name = "ChannelDurableObject"

[[migrations]]
tag = "v1"
new_classes = ["ChannelDurableObject"]

# ── KV Namespaces ─────────────────────────────────────────────────────────────
# Create via: wrangler kv:namespace create KV_JWKS --config workers/realtime/wrangler.toml
# Then paste the id below.
[[kv_namespaces]]
binding = "KV_JWKS"
id = "REPLACE_WITH_KV_JWKS_ID"

# Create via: wrangler kv:namespace create KV_CACHE --config workers/realtime/wrangler.toml
[[kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_KV_CACHE_ID"

# ── Static vars (non-secret) ──────────────────────────────────────────────────
[vars]
ENV = "development"
CORS_ORIGINS = "http://localhost:8081,http://localhost:5173,http://localhost:3000"

# ── Secrets (set via CLI, never in toml) ─────────────────────────────────────
# wrangler secret put FIREBASE_PROJECT_ID --config workers/realtime/wrangler.toml
# wrangler secret put FIREBASE_SERVICE_ACCOUNT_JSON --config workers/realtime/wrangler.toml

# ── Staging environment ───────────────────────────────────────────────────────
[env.staging]
name = "btd-realtime-staging"
vars = { ENV = "staging", CORS_ORIGINS = "https://staging.battudao.com,http://localhost:8081,http://localhost:5173" }

[[env.staging.durable_objects.bindings]]
name = "CHANNEL"
class_name = "ChannelDurableObject"

[[env.staging.kv_namespaces]]
binding = "KV_JWKS"
id = "REPLACE_WITH_KV_JWKS_STAGING_ID"

[[env.staging.kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_KV_CACHE_STAGING_ID"

# ── Production environment ────────────────────────────────────────────────────
[env.production]
name = "btd-realtime-production"
vars = { ENV = "production", CORS_ORIGINS = "https://battudao.com,https://immortality.vn" }

[[env.production.durable_objects.bindings]]
name = "CHANNEL"
class_name = "ChannelDurableObject"

[[env.production.kv_namespaces]]
binding = "KV_JWKS"
id = "REPLACE_WITH_KV_JWKS_PRODUCTION_ID"

[[env.production.kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_KV_CACHE_PRODUCTION_ID"
