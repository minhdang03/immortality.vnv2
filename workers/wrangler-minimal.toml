# Deploy TỐI THIỂU — chỉ agent write plane (/v1/content) cho goclaw publisher.
# Không D1/KV/Vectorize/R2/cron. Plane Firebase (/api/profiles, /api/questions,
# /api/votes) đã gỡ hẳn 21/07/2026 — worker giờ chỉ còn /api/health + /v1/content.
# Bản SP1 đầy đủ ở ./wrangler.toml — dùng khi đã tạo đủ resources.
#
# Deploy:  npx wrangler deploy --config wrangler-minimal.toml          (từ workers/)
# Secret:  npx wrangler secret put SUPABASE_SERVICE_ROLE --config wrangler-minimal.toml

name = "btd-api"
main = "api/src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
ENV = "production"
CORS_ORIGINS = "https://battudao.com,https://immortality.vn"
SUPABASE_URL = "https://dzctvmrlsxwkcuidsqzk.supabase.co"
